<!DOCTYPE html>
<html lang="en">
<head>

        <div id="wrap">
            <h1>Cinkacka</h1>

            </div>
            <div>
                🍒 Třešně: 
                <input type="number" id="input_che_prob" />
            </div>
            <div>
                🍋 Citron: 
                <input type="number" id="input_lem_prob" />
            </div>
            <div>
                🍉 Meloun: 
                <input type="number" id="input_mel_prob" />
            </div>
            <div>
                <button onclick="save_setup()">Ulozit</button>
            </div>
        </div>
        <div id="tabs">
            <a href="account.html" class="tab">Účet</a>
            <a href="index.html" class="tab">Cinkačka</a>
            <a href="setup.html" class="tab active">Nastavení</a>
